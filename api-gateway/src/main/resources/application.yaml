server:
  port: 9000

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: PRODUCT
              uri: lb://PRODUCT
              predicates:
                - Path=/product/**
            - id: ORDERS
              uri: lb://ORDERS
              predicates:
                - Path=/orders/**
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
